name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tests
        run: python3 .claude/scripts/test_hooks.py

      - name: Generate changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          python3 .github/scripts/generate-changelog.py "$VERSION" > /tmp/release_body.md
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Commit changelog and manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md vault-manifest.json
          git commit -m "release: update CHANGELOG and manifest for $VERSION"
          git push origin main

      - name: Build vault zip
        run: |
          ZIP_NAME="obsidian-mind-${VERSION}.zip"

          zip -r "$ZIP_NAME" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".claude/scripts/test_hooks.py" \
            -x ".DS_Store" \
            -x "thinking/session-logs/*"

          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create or update release
        run: |
          if gh release view "$VERSION" &>/dev/null; then
            gh release edit "$VERSION" --notes-file /tmp/release_body.md
            gh release upload "$VERSION" "$ZIP_NAME" --clobber
          else
            gh release create "$VERSION" "$ZIP_NAME" \
              --title "$VERSION" \
              --notes-file /tmp/release_body.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
